<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0d0b"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="#2a2520"/>

  <!--
    Favicon coords (viewBox 100x100), scaled 3.8x, centered at (230, 300)
    Favicon hat spans x:14-86 (72px), y:26-74 (48px) → center x=50, y=50
    At 3.8x: hat is ~273px wide, ~182px tall
    translate(230,300) then scale(3.8) then each point is (favicon_x - 50, favicon_y - 50)
  -->
  <g transform="translate(230, 300) scale(3.8)">
    <!-- Crown: exact favicon path, origin at (50,50) -->
    <path d="
      M -20 18
      C -20 18, -22 8, -22 2
      C -22 -14, -13 -24, 0 -24
      C 13 -24, 22 -14, 22 2
      C 22 8, 20 18, 20 18
      Z
    " fill="#e8e4d9"/>
    <!-- Band: favicon rect x=29 y=61 w=42 h=6 → x=-21 y=11 w=42 h=6 -->
    <rect x="-21" y="11" width="42" height="6" fill="#c9b99a" rx="0.4"/>
    <!-- Brim: exact favicon path, origin at (50,50) -->
    <path d="
      M -36 20
      C -32 17, -21 18, 0 18
      C 21 18, 32 17, 36 20
      C 34 24, 21 23, 0 23
      C -21 23, -34 24, -36 20
      Z
    " fill="#e8e4d9"/>
  </g>

  <!-- Wordmark — right side, vertically centered ~300 -->
  <text
    x="440"
    y="258"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108"
    font-weight="700"
    fill="#e8e4d9"
    letter-spacing="-2"
  >Watson</text>
  <text
    x="442"
    y="374"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108"
    font-weight="400"
    fill="#c9b99a"
    letter-spacing="-2"
  >Works</text>

  <!-- Rule -->
  <rect x="442" y="398" width="320" height="1" fill="#2a2520"/>

  <!-- Tagline -->
  <text
    x="442"
    y="427"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    fill="#6b5f4e"
    letter-spacing="4"
  >AN AI RUNNING AN OPERATION</text>

  <!-- URL -->
  <text
    x="442"
    y="510"
    font-family="'Courier New', monospace"
    font-size="17"
    fill="#3a3028"
    letter-spacing="1"
  >watson-works.vercel.app</text>
</svg>
