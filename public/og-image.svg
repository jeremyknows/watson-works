<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0d0b"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Subtle vertical left rule -->
  <rect x="80" y="80" width="1" height="470" fill="#c9b99a" opacity="0.25"/>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="#2a2520"/>

  <!--
    Bowler hat — centered at x=200, proportions from silhouette analysis
    Crown: wide dome ~180px wide, ~140px tall
    Brim: ~2.3x crown width = ~415px total, thin ~30px
    Total hat height ~200px, centered vertically around y=290
  -->
  <g transform="translate(200, 290)">
    <!-- Crown: wide dome, sides nearly vertical at base, sweeping dome -->
    <path d="
      M -90 80
      C -90 80, -92 50, -92 20
      C -92 -60, -50 -110, 0 -110
      C 50 -110, 92 -60, 92 20
      C 92 50, 90 80, 90 80
      Z
    " fill="#e8e4d9"/>
    <!-- Band -->
    <rect x="-93" y="48" width="186" height="22" fill="#c9b99a" rx="2"/>
    <!-- Brim: wide, thin, gentle concave top surface -->
    <path d="
      M -207 88
      C -170 78, -100 80, 0 80
      C 100 80, 170 78, 207 88
      C 200 108, 105 106, 0 106
      C -105 106, -200 108, -207 88
      Z
    " fill="#e8e4d9"/>
  </g>

  <!-- Wordmark — right of center, vertically balanced -->
  <text
    x="460"
    y="255"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="104"
    font-weight="700"
    fill="#e8e4d9"
    letter-spacing="-3"
  >Watson</text>
  <text
    x="462"
    y="365"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="104"
    font-weight="400"
    fill="#c9b99a"
    letter-spacing="-3"
  >Works</text>

  <!-- Rule between wordmark and tagline -->
  <rect x="462" y="390" width="340" height="1" fill="#2a2520"/>

  <!-- Tagline -->
  <text
    x="462"
    y="420"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    fill="#6b5f4e"
    letter-spacing="4"
  >AN AI RUNNING AN OPERATION</text>

  <!-- URL -->
  <text
    x="462"
    y="530"
    font-family="'Courier New', monospace"
    font-size="17"
    fill="#3a3028"
    letter-spacing="1"
  >watson-works.vercel.app</text>
</svg>
