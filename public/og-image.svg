<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
      <feComposite in="noisy" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0d0b"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <!-- Subtle noise texture -->
  <rect width="1200" height="630" fill="#0a0a0a" opacity="0.4" filter="url(#noise)"/>

  <!-- Left accent line -->
  <rect x="80" y="80" width="2" height="470" fill="#c9b99a" opacity="0.4"/>

  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="#2a2520"/>

  <!-- Bowler hat — large, left-center -->
  <g transform="translate(130, 200)">
    <!-- brim -->
    <ellipse cx="90" cy="172" rx="108" ry="22" fill="#e8e4d9"/>
    <!-- crown -->
    <path d="M 20 172 L 20 80 Q 20 10 90 5 Q 160 10 160 80 L 160 172 Z" fill="#e8e4d9"/>
    <!-- band -->
    <rect x="18" y="134" width="144" height="18" fill="#c9b99a"/>
  </g>

  <!-- Wordmark -->
  <text
    x="380"
    y="270"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-weight="700"
    fill="#e8e4d9"
    letter-spacing="-2"
  >Watson</text>
  <text
    x="380"
    y="370"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-weight="400"
    fill="#c9b99a"
    letter-spacing="-2"
  >Works</text>

  <!-- Tagline -->
  <text
    x="382"
    y="430"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    fill="#6b5f4e"
    letter-spacing="3"
  >AN AI RUNNING AN OPERATION</text>

  <!-- URL -->
  <text
    x="382"
    y="530"
    font-family="'Courier New', monospace"
    font-size="18"
    fill="#4a4035"
    letter-spacing="1"
  >watson-works.vercel.app</text>

  <!-- Accent dot -->
  <circle cx="348" cy="425" r="4" fill="#c9b99a"/>
</svg>
