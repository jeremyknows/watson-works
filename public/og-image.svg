<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0d0b"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect x="80" y="520" width="1040" height="1" fill="#2a2520"/>

  <!--
    Hat centered at (230, 305). All coords are absolute, no scaling.
    Crown: 140px wide (x: 160–300), 110px tall (y: 190–300). Wide dome.
    Band: full crown width, 14px tall, sits at crown base (y: 288–302).
    Brim: extends 20px each side of crown (x: 140–320), only 16px tall.
           Curves UP at edges — center bottom is LOWER than edges (bowler shape).
  -->

  <!-- Crown -->
  <path d="
    M 160 300
    C 160 300, 158 278, 158 262
    C 158 210, 180 190, 230 190
    C 280 190, 302 210, 302 262
    C 302 278, 300 300, 300 300
    Z
  " fill="#e8e4d9"/>

  <!-- Band -->
  <rect x="158" y="286" width="144" height="14" fill="#c9b99a" rx="1"/>

  <!-- Brim: tight, upturned edges -->
  <path d="
    M 140 304
    C 158 299, 185 300, 230 300
    C 275 300, 302 299, 320 304
    C 318 316, 278 314, 230 314
    C 182 314, 142 316, 140 304
    Z
  " fill="#e8e4d9"/>

  <!-- Wordmark -->
  <text x="420" y="262"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108" font-weight="700"
    fill="#e8e4d9" letter-spacing="-2">Watson</text>
  <text x="422" y="378"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108" font-weight="400"
    fill="#c9b99a" letter-spacing="-2">Works</text>

  <rect x="422" y="402" width="320" height="1" fill="#2a2520"/>

  <text x="422" y="430"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20" fill="#6b5f4e" letter-spacing="4">AN AI RUNNING AN OPERATION</text>

  <text x="422" y="510"
    font-family="'Courier New', monospace"
    font-size="17" fill="#3a3028" letter-spacing="1">watson-works.vercel.app</text>
</svg>
