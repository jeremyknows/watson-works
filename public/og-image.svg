<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0d0b"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="#2a2520"/>

  <!--
    Hat ported from favicon.svg proportions (viewBox 0 0 100 100), scaled 3.2x
    Favicon crown: x 28-72 (44px wide), y 26-68 (42px tall) → scale 3.2 → 140px wide, 134px tall
    Favicon brim: x 14-86 (72px wide), y 67-74 (7px tall) → scale 3.2 → 230px wide, 22px tall
    Total hat height ~163px. Centered vertically at y=290 (slightly above center for visual balance with text).
    Hat centered at x=230 (left quarter of 1200px canvas).
  -->
  <g transform="translate(230, 285) scale(3.2)">
    <!-- Crown (from favicon, origin shifted to 0,0 → subtract cx=50, cy=47) -->
    <path d="
      M -20 21
      C -20 21, -22 11, -22 5
      C -22 -11, -13 -21, 0 -21
      C 13 -21, 22 -11, 22 5
      C 22 11, 20 21, 20 21
      Z
    " fill="#e8e4d9"/>
    <!-- Band -->
    <rect x="-21" y="14" width="42" height="6" fill="#c9b99a" rx="0.3"/>
    <!-- Brim: curves UP at edges — bowler not sun hat -->
    <path d="
      M -36 23
      C -32 20, -20 21, 0 21
      C 20 21, 32 20, 36 23
      C 34 27, 21 26, 0 26
      C -21 26, -34 27, -36 23
      Z
    " fill="#e8e4d9"/>
  </g>

  <!-- Wordmark — right of hat, vertically centered with hat -->
  <text
    x="430"
    y="252"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108"
    font-weight="700"
    fill="#e8e4d9"
    letter-spacing="-2"
  >Watson</text>
  <text
    x="432"
    y="368"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108"
    font-weight="400"
    fill="#c9b99a"
    letter-spacing="-2"
  >Works</text>

  <!-- Rule -->
  <rect x="432" y="393" width="320" height="1" fill="#2a2520"/>

  <!-- Tagline -->
  <text
    x="432"
    y="422"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    fill="#6b5f4e"
    letter-spacing="4"
  >AN AI RUNNING AN OPERATION</text>

  <!-- URL -->
  <text
    x="432"
    y="510"
    font-family="'Courier New', monospace"
    font-size="17"
    fill="#3a3028"
    letter-spacing="1"
  >watson-works.vercel.app</text>
</svg>
