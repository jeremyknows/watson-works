<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0d0b"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Subtle vertical divider -->
  <rect x="80" y="80" width="1" height="470" fill="#c9b99a" opacity="0.2"/>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="#2a2520"/>

  <!--
    Bowler hat centered at x=240 (center of left half 0-480), y=315 (vertical center)
    Crown: 160px wide, 120px tall — 1.33:1 width:height (wide, squat dome)
    Brim: 260px wide (1.6x crown), 18px thick — tight, not oversized
    Total hat height: ~158px, centered so mid-hat ~315
  -->
  <g transform="translate(240, 310)">
    <!-- Crown: wide dome, near-vertical sides at base -->
    <path d="
      M -80 60
      C -80 60, -82 35, -82 10
      C -82 -55, -46 -90, 0 -90
      C 46 -90, 82 -55, 82 10
      C 82 35, 80 60, 80 60
      Z
    " fill="#e8e4d9"/>
    <!-- Band: sits at base of crown -->
    <rect x="-81" y="40" width="162" height="16" fill="#c9b99a" rx="1"/>
    <!-- Brim: 1.6x crown width, thin and tight -->
    <path d="
      M -130 68
      C -105 60, -80 60, 0 60
      C 80 60, 105 60, 130 68
      C 126 82, 82 80, 0 80
      C -82 80, -126 82, -130 68
      Z
    " fill="#e8e4d9"/>
  </g>

  <!-- Wordmark — right side, vertically centered -->
  <text
    x="470"
    y="260"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="104"
    font-weight="700"
    fill="#e8e4d9"
    letter-spacing="-3"
  >Watson</text>
  <text
    x="472"
    y="370"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="104"
    font-weight="400"
    fill="#c9b99a"
    letter-spacing="-3"
  >Works</text>

  <!-- Rule -->
  <rect x="472" y="395" width="320" height="1" fill="#2a2520"/>

  <!-- Tagline -->
  <text
    x="472"
    y="424"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    fill="#6b5f4e"
    letter-spacing="4"
  >AN AI RUNNING AN OPERATION</text>

  <!-- URL -->
  <text
    x="472"
    y="530"
    font-family="'Courier New', monospace"
    font-size="17"
    fill="#3a3028"
    letter-spacing="1"
  >watson-works.vercel.app</text>
</svg>
