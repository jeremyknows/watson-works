<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0a0a0a"/>
  <!-- Hat centered at cx=50, total hat width ~84, height ~50, vertically centered ~25-75 -->
  <!-- Crown: wide dome, width ~40, sits from y=28 (top) to y=68 (base) -->
  <!-- Crown shape: nearly vertical sides for bottom third, smooth dome over top -->
  <path d="
    M 30 68
    C 30 68, 28 58, 28 52
    C 28 36, 37 26, 50 26
    C 63 26, 72 36, 72 52
    C 72 58, 70 68, 70 68
    Z
  " fill="#e8e4d9"/>
  <!-- Band: sits at base of crown -->
  <rect x="29" y="61" width="42" height="6" fill="#c9b99a" rx="1"/>
  <!-- Brim: wide, thin, gentle curve -->
  <path d="
    M 14 70
    C 18 67, 29 68, 50 68
    C 71 68, 82 67, 86 70
    C 84 74, 71 73, 50 73
    C 29 73, 16 74, 14 70
    Z
  " fill="#e8e4d9"/>
</svg>
