<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0a0a0a"/>
  <!-- brim (wide ellipse at bottom) -->
  <ellipse cx="50" cy="72" rx="38" ry="9" fill="#e8e4d9"/>
  <!-- crown (rounded top, flat bottom at band) -->
  <path d="M 28 72 L 28 52 Q 28 22 50 20 Q 72 22 72 52 L 72 72 Z" fill="#e8e4d9"/>
  <!-- band -->
  <rect x="27" y="60" width="46" height="6" fill="#c9b99a"/>
  <!-- subtle top curve highlight -->
  <ellipse cx="50" cy="20" rx="22" ry="5" fill="#e8e4d9"/>
</svg>
